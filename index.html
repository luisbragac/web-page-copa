<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa Do Mundo Fifa 2026</title>
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>
    <header>
        <nav>
            <div class="logo">
                <img src="imagens/logo-fifa.webp" alt="Logo Copa Do Mundo Fifa 2026">
                <a href="#">Copa Do Mundo 2026 <small>Fifa World Cup</small></a>
            </div>

            <ul class="links-nav">
                <li><a href="#" class="nav-list">Jogos</a></li>
                <li><a href="#" class="nav-list">Estádios</a></li>
                <li><a href="#" class="nav-list">Ingressos</a></li>
                <li><a href="#" class="nav-list">FAQ</a></li>
                <li><a href="#" class="nav-list">Contato</a></li>
            </ul>
            <a href="#" class="comprar-ingresso-botao">Comprar Ingressos</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="titulo">
                <h1 class="hero-title">COPA DO MUNDO 2026</h1>
                <p>Viva a emoção do maior evento esportivo do planeta</p>
            </div>

            <div class="contador">
                <div class="dias" id="contagem">
                    <p>365 <span>DIAS</span></p>
                </div>
                <p><span>:</span class="pt2"></p>
                <div class="horas" id="contagem">
                    <p>12 <span>HORAS</span></p>
                </div>
                <p>:</p>
                <div class="minutos" id="contagem">
                    <p>45 <span>MINUTOS</span></p>
                </div>
                <p>:</p>
                <div class="segundos" id="contagem">
                    <p>30 <span>SEGUNDOS</span></p>
                </div>
            </div>

            <a href="#" class="comprar-ingresso-botao">Comprar Ingressos</a>
        </section>
    </main>
</body>

</html>
